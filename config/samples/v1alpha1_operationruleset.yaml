apiVersion: ifo.kubevirt.io/v1alpha1
kind: OperationRuleSet
metadata:
  labels:
    app.kubernetes.io/name: inflightoperations
    app.kubernetes.io/managed-by: kustomize
  name: operationruleset-sample
spec:
  target:
    group: apps
    version: v1
    resource: deployments
  rules:
    - operation: Rollout
      expression: |
        has(object.status) &&
        (!has(object.status.availableReplicas) || (object.status.availableReplicas < object.spec.replicas))
