apiVersion: ifo.kubevirt.io/v1alpha1
kind: OperationRuleSet
metadata:
  name: dynamic-label-rules
spec:
  target:
    group: apps
    version: v1
    resource: deployments
  namespaces: ["e2e-test"]
  labelExpressions:
    - key: e2e-dynamic-ns
      expression: object.metadata.namespace
  rules:
    - operation: Rollout
      expression: |
        has(object.status) &&
        (!has(object.status.availableReplicas) || (object.status.availableReplicas < object.spec.replicas))
