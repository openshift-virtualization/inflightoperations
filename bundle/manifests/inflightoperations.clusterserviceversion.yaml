---
apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Basic Install
    containerImage: quay.io/ifo-operator/controller:v0.0.5
    repository: https://github.com/openshift-virtualization/inflightoperations
  name: inflightoperations.v0.0.5
  namespace: inflightoperations-system
spec:
  customresourcedefinitions:
    owned:
    - kind: InFlightOperation
      name: inflightoperations.ifo.kubevirt.io
      version: v1alpha1
    - kind: OperationRuleSet
      name: operationrulesets.ifo.kubevirt.io
      version: v1alpha1
  description: Detects in-flight operations on Kubernetes resources using CEL expressions
    and creates InFlightOperation objects to track them.
  displayName: InFlightOperations
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ifo.kubevirt.io
          resources:
          - inflightoperations
          - operationrulesets
          verbs:
          - create
          - delete
          - deletecollection
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ifo.kubevirt.io
          resources:
          - inflightoperations/finalizers
          - operationrulesets/finalizers
          verbs:
          - update
        - apiGroups:
          - ifo.kubevirt.io
          resources:
          - inflightoperations/status
          - operationrulesets/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        - apiGroups:
          - ""
          - apps
          - kubevirt.io
          - cdi.kubevirt.io
          - hco.kubevirt.io
          - snapshot.kubevirt.io
          - clone.kubevirt.io
          - export.kubevirt.io
          - networkaddonsoperator.network.kubevirt.io
          - ssp.kubevirt.io
          - hostpathprovisioner.kubevirt.io
          - aaq.kubevirt.io
          - operators.coreos.com
          - machine.openshift.io
          - machineconfiguration.openshift.io
          - config.openshift.io
          resources:
          - '*'
          verbs:
          - get
          - list
          - watch
        serviceAccountName: inflightoperations-controller-manager
      deployments:
      - label:
          app.kubernetes.io/name: inflightoperations
          control-plane: controller-manager
        name: inflightoperations-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: inflightoperations
              control-plane: controller-manager
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: inflightoperations
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --metrics-bind-address=:8443
                - --leader-elect
                - --health-probe-bind-address=:8081
                command:
                - /manager
                env:
                - name: OPERATOR_VERSION
                  value: v0.0.5
                image: quay.io/ifo-operator/controller:v0.0.5
                imagePullPolicy: IfNotPresent
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 10m
                    memory: 256Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  readOnlyRootFilesystem: true
                terminationMessagePolicy: FallbackToLogsOnError
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: inflightoperations-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: inflightoperations-controller-manager
    strategy: deployment
  installModes:
  - supported: false
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - inflightoperations
  - kubevirt
  - virtualization
  - observability
  links:
  - name: Source Code
    url: https://github.com/openshift-virtualization/inflightoperations
  maintainers:
  - email: slucidi@redhat.com
    name: Samuel Lucidi
  maturity: alpha
  provider:
    name: Red Hat
    url: https://www.redhat.com
  version: 0.0.5
